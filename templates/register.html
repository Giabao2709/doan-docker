<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - IT DOCKER PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: #0f172a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: sans-serif; 
        }
        .register-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            width: 400px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
        }
        .form-control { border-radius: 10px; padding: 10px; }
        .btn-primary { border-radius: 10px; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="text-center mb-4">
            <i class="fa-solid fa-user-plus text-primary fs-1 mb-2"></i>
            <h3 class="fw-bold">TẠO TÀI KHOẢN</h3>
            <p class="text-muted small">Đăng ký để trải nghiệm IT-DOCKER</p>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2 small">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold">Tên tài khoản</label>
                <input type="text" name="username" class="form-control" placeholder="Nhập username" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Email</label>
                <input type="email" name="email" class="form-control" placeholder="vi-du@gmail.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Mật khẩu</label>
                <input type="password" name="password" class="form-control" placeholder="********" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">ĐĂNG KÝ NGAY</button>
            <p class="text-center mt-3 small text-muted">
                Đã có tài khoản? <a href="/" class="text-primary fw-bold text-decoration-none">Đăng nhập</a>
            </p>
        </form>
    </div>
</body>
</html>
